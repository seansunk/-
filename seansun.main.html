function bootEngine() {
    const disp = document.getElementById('engineDisplay');
    const genre = document.getElementById('masterGenre').value;
    disp.innerHTML = '';
    const data = DB[genre];
    data.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'step-module';
        const opts = item.o.map(opt => `<option value="${opt.e}">${opt.k} (${opt.e})</option>`).join('');
        div.innerHTML = `<label>STEP ${String(i+1).padStart(2, '0')} : ${item.s}</label>
                         <select id="s${i}">${opts}</select>`;
        disp.appendChild(div);
    });
}

function ignite() {
    const sel = document.getElementById('masterGenre');
    let res = `[SEANSUN v17.0 FINAL] GENRE: ${sel.options[sel.selectedIndex].text} | PARAMS: `;
    document.querySelectorAll('.step-module select').forEach(s => { res += s.value + ", "; });
    res += "All Manual Hardcoded Data, UHD Fidelity.";
    document.getElementById('output').value = res;
    navigator.clipboard.writeText(res);
    alert('SUPREME PROMPT COPIED! (1,800 DATA FULL LOADED)');
}
